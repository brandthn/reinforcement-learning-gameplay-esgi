env: bobail
agent: dqn
opponent: random
agent_params:
  lr: 0.0005
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 100000
  hidden_layers:
  - 256
  - 128
  batch_size: 64
  buffer_capacity: 50000
  target_update_freq: 500
training:
  num_episodes: 50000
  max_steps_per_episode: 500
eval:
  checkpoints:
  - 1000
  - 10000
  - 50000
  num_games: 50
seeds:
- 42
