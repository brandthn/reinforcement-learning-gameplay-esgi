env: line_world
agent: reinforce

agent_params:
  lr: 0.001
  gamma: 0.99
  hidden_layers: [64, 64]

sweep:
  agent_params.lr: [0.003, 0.001, 0.0003]
  agent_params.gamma: [0.95, 0.99]

training:
  num_episodes: 1000000
  max_steps_per_episode: 100

eval:
  checkpoints: [1000, 10000, 100000, 250000, 1000000]
  num_games: 100

seeds: [42, 123]
