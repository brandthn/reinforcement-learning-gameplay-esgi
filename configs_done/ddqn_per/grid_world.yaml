env: grid_world
agent: ddqn_per
agent_params:
  lr: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_steps: 20000
  hidden_layers:
  - 64
  - 64
  batch_size: 64
  buffer_capacity: 10000
  target_update_freq: 200
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  per_beta_steps: 80000
  learning_starts: 1000
training:
  num_episodes: 50000
  max_steps_per_episode: 200
eval:
  checkpoints:
  - 1000
  - 10000
  - 50000
  num_games: 100
seeds:
- 42
