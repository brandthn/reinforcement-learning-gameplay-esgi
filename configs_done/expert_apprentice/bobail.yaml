env: bobail
agent: expert_apprentice
opponent: random
agent_params:
  lr: 0.0005
  hidden_layers: [256, 128]
  mlp_activation: relu
  n_simulations: 200
  c_uct: 1.41
  max_rollout_depth: 200
  gamma: 1.0
  max_iterations: 5
  policy_bonus_weight: 1.0
  opening_moves_to_skip: 4
  val_fraction: 0.1
  max_epochs: 40
  early_stopping_patience: 6
  min_delta: 0.0001
  buffer_capacity: 100000
  batch_size: 64
  learning_starts: 5000
  train_steps_per_observe: 1
training:
  num_episodes: 50000
  max_steps_per_episode: 500
eval:
  checkpoints:
    - 1000
    - 10000
    - 50000
  num_games: 50
seeds:
  - 42
