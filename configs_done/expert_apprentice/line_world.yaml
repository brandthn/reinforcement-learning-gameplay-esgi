env: line_world
agent: expert_apprentice
agent_params:
  lr: 0.001
  hidden_layers: [4, 4]
  mlp_activation: relu
  n_simulations: 80
  c_uct: 1.41
  max_rollout_depth: 100
  gamma: 1.0
  max_iterations: 5
  policy_bonus_weight: 1.0
  opening_moves_to_skip: 1
  val_fraction: 0.1
  max_epochs: 20
  early_stopping_patience: 4
  min_delta: 0.0001
  buffer_capacity: 50000
  batch_size: 64
  learning_starts: 2000
  train_steps_per_observe: 1
training:
  num_episodes: 100000
  max_steps_per_episode: 100
eval:
  checkpoints:
    - 1000
    - 10000
    - 50000
    - 100000
  num_games: 100
seeds:
  - 42
