# configs/ppo/tictactoe.yaml
# ─────────────────────────────────────────────────────────────────────────────
# PPO A2C style — TicTacToe (adversarial)
# ─────────────────────────────────────────────────────────────────────────────
 
env: tictactoe
agent: ppo
opponent: random
 
agent_params:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  hidden_layers: [128, 128]
  n_epochs: 4
  batch_size: 32
  max_grad_norm: 0.5

sweep:
  agent_params.lr: [1.0e-3, 1.0e-2]
  agent_params.hidden_layers: [[32, 32], [128, 128]]
  agent_params.entropy_coef: [0.01, 0.05]
 
training:
  num_episodes: 100000
  max_steps_per_episode: 50
 
eval:
  checkpoints: [1000, 10000, 50000, 70000, 100000]
  num_games: 100
 
seeds: [42]