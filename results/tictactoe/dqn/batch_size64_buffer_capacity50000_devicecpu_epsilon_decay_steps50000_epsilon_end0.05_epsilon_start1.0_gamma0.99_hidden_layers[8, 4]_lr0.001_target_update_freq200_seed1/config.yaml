  buffer_capacity: 50000
  epsilon_decay_steps: 50000
  epsilon_end: 0.05
  epsilon_start: 1.0
  gamma: 0.99
  hidden_layers:
  - 8
  - 4
  lr: 0.001
  target_update_freq: 200
env: tictactoe
eval:
  checkpoints:
  - 1000
  - 10000
  - 50000
  - 75000
  - 100000
  num_games: 100
opponent: random
seed: 1
seeds:
- 1
- 2
training:
  max_steps_per_episode: 20
  num_episodes: 100000
