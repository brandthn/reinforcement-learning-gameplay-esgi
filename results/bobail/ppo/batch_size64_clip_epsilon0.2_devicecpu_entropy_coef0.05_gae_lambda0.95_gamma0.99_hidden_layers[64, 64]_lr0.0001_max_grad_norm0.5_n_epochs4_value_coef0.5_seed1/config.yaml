agent: ppo
agent_params:
  batch_size: 64
  clip_epsilon: 0.2
  entropy_coef: 0.05
  gae_lambda: 0.95
  gamma: 0.99
  hidden_layers:
  - 64
  - 64
  lr: 0.0001
  max_grad_norm: 0.5
  n_epochs: 4
  value_coef: 0.5
env: bobail
eval:
  checkpoints:
  - 10
  - 50
  - 100
  - 500
  - 1000
  - 5000
  - 10000
  num_games: 10000
opponent: random
seed: 1
seeds:
- 1
- 2
training:
  max_steps_per_episode: 200
  num_episodes: 10000
