agent: ppo
agent_params:
  batch_size: 64
  clip_epsilon: 0.2
  entropy_coef: 0.1
  gae_lambda: 0.95
  gamma: 0.99
  hidden_layers:
  - 64
  - 64
  lr: 0.001
  max_grad_norm: 0.5
  n_epochs: 10
  value_coef: 0.5
env: bobail
eval:
  checkpoints:
  - 10
  - 50
  - 100
  - 500
  - 700
  - 1000
  num_games: 1000
opponent: random
seed: 2
seeds:
- 1
- 2
training:
  max_steps_per_episode: 100
  num_episodes: 1000
