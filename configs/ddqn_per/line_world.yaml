env: line_world
agent: ddqn_per

agent_params:
  lr: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_steps: 10000
  hidden_layers: [64, 64]
  batch_size: 64
  buffer_capacity: 10000
  target_update_freq: 100
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  per_beta_steps: 50000
  learning_starts: 500

training:
  num_episodes: 100000
  max_steps_per_episode: 100

eval:
  checkpoints: [1000, 10000, 100000]
  num_games: 100

seeds: [42, 123]
